<!doctype html>
<html lang="pt-BR" data-accent="amber">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard — Forneria Don Tonhão</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
/* ═══════════════════════════════════════════════
   DASHBOARD SHELL
═══════════════════════════════════════════════ */
.dash-app {
  display: grid;
  grid-template-areas: "header header" "sidebar main";
  grid-template-columns: 240px 1fr;
  grid-template-rows: 64px 1fr;
  height: 100vh; overflow: hidden;
  transition: grid-template-columns 220ms ease;
}
.dash-app.sidebar-collapsed { grid-template-columns: 64px 1fr; }

/* ═══ HEADER ═══ */
.dash-header {
  grid-area: header;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 64px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev); z-index: 100;
}
.d-hamburger {
  width: 34px; height: 34px; border-radius: 8px;
  display: grid; place-items: center;
  color: var(--fg-muted); background: none; border: none; cursor: pointer;
  flex-shrink: 0; transition: color 100ms;
}
.d-hamburger:hover { color: var(--fg); }
.d-search { flex: 1; max-width: 420px; position: relative; flex-shrink: 0; }
.d-search input {
  width: 100%; padding: 8px 14px 8px 34px;
  border: 1px solid var(--line); border-radius: 8px;
  background: var(--bg-sunken); font: inherit; font-size: 13px;
  transition: border-color 120ms, box-shadow 120ms;
}
.d-search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.d-search input::placeholder { color: var(--fg-soft); }
.d-search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--fg-soft); pointer-events: none; }
.d-clock { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted); flex-shrink: 0; }
.d-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Store badge */
.d-store-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 12px 5px 9px; border-radius: 999px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--line); background: var(--bg-sunken);
  transition: all 120ms; white-space: nowrap; flex-shrink: 0;
}
.d-store-badge.open  { border-color: color-mix(in oklab,var(--good) 30%,transparent); background: color-mix(in oklab,var(--good) 7%,transparent); color: var(--good); }
.d-store-badge.closed{ border-color: color-mix(in oklab,var(--danger) 25%,transparent); background: color-mix(in oklab,var(--danger) 6%,transparent); color: var(--danger); }
.d-pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; position: relative; }
.d-store-badge.open .d-pulse-dot::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  border: 1.5px solid currentColor; opacity: 0.35;
  animation: dash-pulse 2s ease-out infinite;
}

/* Icon button */
.d-icon-btn {
  position: relative; width: 34px; height: 34px; border-radius: 8px;
  display: grid; place-items: center; color: var(--fg-muted);
  border: 1px solid var(--line); background: var(--bg-sunken);
  transition: background 100ms, color 100ms; cursor: pointer; flex-shrink: 0;
}
.d-icon-btn:hover { background: var(--bg); color: var(--fg); }
.d-notif-badge {
  position: absolute; top: -5px; right: -5px;
  min-width: 17px; height: 17px; border-radius: 9px;
  background: var(--danger); color: white;
  font-size: 10px; font-weight: 700; font-family: var(--font-mono);
  display: grid; place-items: center; padding: 0 3px;
  border: 2px solid var(--bg-elev);
}

/* User button */
.d-user-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px 4px 4px; border-radius: 8px;
  border: 1px solid var(--line); background: var(--bg-sunken);
  cursor: pointer; transition: background 100ms; flex-shrink: 0;
}
.d-user-btn:hover { background: var(--bg); }
.d-user-info { display: flex; flex-direction: column; }
.d-user-name { font-size: 12px; font-weight: 600; white-space: nowrap; }
.d-user-role { font-size: 10px; color: var(--fg-muted); }

/* Dropdown */
.d-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--bg-elev); border: 1px solid var(--line-strong);
  border-radius: 10px; box-shadow: var(--shadow-lg);
  z-index: 300; overflow: hidden;
  animation: dash-fadein 150ms ease-out;
}
.d-dropdown-head {
  padding: 10px 14px; background: var(--bg-sunken);
  border-bottom: 1px solid var(--line);
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: space-between;
}
.d-dd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; font-size: 13px; font-weight: 500;
  color: var(--fg-muted); cursor: pointer; text-align: left;
  width: 100%; border: none; background: none;
  border-bottom: 1px solid var(--line); transition: background 80ms, color 80ms;
}
.d-dd-item:last-child { border-bottom: none; }
.d-dd-item:hover { background: var(--bg-sunken); color: var(--fg); }

/* Notifications */
.d-notif-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px; border-bottom: 1px solid var(--line);
  transition: background 80ms; cursor: pointer;
}
.d-notif-item:hover { background: var(--bg-sunken); }
.d-notif-item:last-child { border-bottom: none; }
.d-notif-item.unread { background: color-mix(in oklab,var(--accent) 4%,transparent); }
.d-notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.d-notif-dot.danger { background: var(--danger); }
.d-notif-dot.warn   { background: var(--warn); }
.d-notif-dot.good   { background: var(--good); }
.d-notif-dot.accent { background: var(--accent); }
.d-notif-text { font-size: 12.5px; font-weight: 500; line-height: 1.4; }
.d-notif-time { font-size: 11px; color: var(--fg-soft); margin-top: 2px; font-family: var(--font-mono); }
.d-notif-action {
  font-size: 11px; font-weight: 600; color: var(--accent); flex-shrink: 0;
  padding: 3px 8px; border-radius: 5px; align-self: center; cursor: pointer;
  border: 1px solid color-mix(in oklab,var(--accent) 30%,transparent); background: none;
}
.d-notif-action:hover { background: var(--accent-soft); }

/* ═══ SIDEBAR ═══ */
.dash-sidebar {
  grid-area: sidebar;
  background: var(--bg-elev); border-right: 1px solid var(--line);
  display: flex; flex-direction: column; overflow: hidden;
  transition: all 220ms ease;
}
.d-sidebar-top {
  padding: 14px 14px 10px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.dash-sidebar.collapsed .d-sidebar-top { justify-content: center; padding: 14px 8px 10px; }
.d-store-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-plan-badge {
  display: inline-block; padding: 1px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  background: var(--accent-soft); color: var(--accent); margin-top: 3px;
}
.d-collapse-btn {
  width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
  display: grid; place-items: center; color: var(--fg-soft);
  border: 1px solid var(--line); background: var(--bg-sunken); cursor: pointer;
}
.d-collapse-btn:hover { color: var(--fg); background: var(--bg); }
.d-nav { flex: 1; overflow-y: auto; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; }
.d-nav-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--fg-soft); font-weight: 600; padding: 8px 8px 4px;
}
.dash-sidebar.collapsed .d-nav-label { display: none; }
.dash-sidebar.collapsed .nav-item { width: 48px; height: 48px; justify-content: center; padding: 0; }
.dash-sidebar.collapsed .nav-label { display: none; }
.nav-item.active { border-left: 3px solid var(--accent); padding-left: 7px; font-weight: 600; }
.dash-sidebar.collapsed .nav-item.active { border-left: none; background: var(--accent-soft); }
.d-sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 4px; }
.d-footer-link {
  font-size: 12px; color: var(--fg-muted); padding: 5px 8px; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  width: 100%; background: none; border: none; text-align: left;
}
.d-footer-link:hover { color: var(--fg); background: var(--bg-sunken); }
.d-sidebar-backdrop { display: none; position: fixed; inset: 0; top: 64px; background: rgba(0,0,0,0.4); z-index: 49; }

/* ═══ MAIN ═══ */
.dash-main { grid-area: main; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; }
.d-page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding: 22px 28px 0; }
.d-greeting { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; }
.d-date { font-size: 13px; color: var(--fg-muted); margin-top: 3px; }
.d-page-head-right { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
.d-period-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.d-pill {
  padding: 6px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 500;
  border: 1px solid var(--line); background: var(--bg-elev); color: var(--fg-muted);
  cursor: pointer; transition: all 100ms; font: inherit;
}
.d-pill:hover { border-color: var(--line-strong); color: var(--fg); }
.d-pill.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.d-view-toggle-bar { padding: 12px 28px 0; }
.d-view-toggle { display: inline-flex; gap: 2px; padding: 2px; background: var(--bg-sunken); border-radius: 9px; border: 1px solid var(--line); }
.d-vt-btn { padding: 6px 16px; border-radius: 7px; font-size: 12.5px; font-weight: 500; cursor: pointer; color: var(--fg-muted); border: none; background: transparent; transition: all 100ms; font: inherit; }
.d-vt-btn.active { background: var(--bg-elev); color: var(--fg); box-shadow: var(--shadow-sm); font-weight: 600; }
.d-main-inner { padding: 20px 28px 40px; display: flex; flex-direction: column; gap: 20px; }

/* ═══ CARD BASE ═══ */
.d-card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); }
.d-card-title { font-size: 14px; font-weight: 600; }
.d-card-sub { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }
.d-link-btn { font-size: 12.5px; color: var(--accent); font-weight: 600; cursor: pointer; background: none; border: none; }
.d-link-btn:hover { text-decoration: underline; }

/* ═══ BLOCO 1 — STATUS BAR ═══ */
.d-status-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.d-status-card {
  padding: 16px 18px; background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); display: flex; flex-direction: column; gap: 8px;
  transition: border-color 120ms, box-shadow 120ms, transform 80ms;
}
.d-status-card:hover { border-color: var(--line-strong); box-shadow: var(--shadow); transform: translateY(-1px); }
.d-status-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; color: var(--fg-soft); display: flex; align-items: center; gap: 6px; }
.d-status-val { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-family: var(--font-mono); }
.d-status-sub { font-size: 12px; color: var(--fg-muted); }
.d-status-bar-wrap { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
.d-status-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 600ms ease; }

/* ═══ BLOCO 2 — MÉTRICAS ═══ */
.d-metric-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.d-metric-card {
  padding: 20px; background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); cursor: pointer;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color 120ms, box-shadow 120ms, transform 80ms;
}
.d-metric-card:hover { border-color: var(--line-strong); box-shadow: var(--shadow); transform: translateY(-1px); }
.d-metric-label { font-size: 12px; color: var(--fg-muted); font-weight: 500; }
.d-metric-icon { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent); flex-shrink: 0; }
.d-metric-val { font-size: 28px; font-weight: 700; letter-spacing: -0.025em; font-family: var(--font-mono); }
.d-metric-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 600; }
.d-metric-delta.up   { color: var(--good); }
.d-metric-delta.down { color: var(--danger); }
.d-metric-comp { font-size: 11.5px; color: var(--fg-soft); }

/* ═══ BLOCO 3 — GRÁFICOS ═══ */
.d-charts-row { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }
.d-donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
.d-donut-val { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }
.d-donut-lbl { font-size: 11px; color: var(--fg-muted); }

/* ═══ BLOCO 4 — TABELA PEDIDOS ═══ */
.d-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.d-table th {
  padding: 9px 16px; text-align: left; background: var(--bg-sunken);
  font-size: 10.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--fg-soft);
  border-bottom: 1px solid var(--line); white-space: nowrap;
}
.d-table td { padding: 12px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }
.d-table tr:last-child td { border-bottom: none; }
.d-table tbody tr { cursor: pointer; transition: background 80ms; }
.d-table tbody tr:hover { background: var(--bg-sunken); }
.d-table tbody tr.new-row { animation: dash-slidein 0.35s ease-out; }
.d-order-id { font-family: var(--font-mono); font-weight: 600; font-size: 12px; color: var(--fg-muted); }
.d-type-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; }
.d-type-badge.mesa     { background: color-mix(in oklab,var(--good) 12%,transparent); color: var(--good); }
.d-type-badge.delivery { background: color-mix(in oklab,#3b82f6 11%,transparent); color: #3b82f6; }
.d-type-badge.balcao   { background: var(--accent-soft); color: var(--accent); }
.d-items-clip { color: var(--fg-muted); font-size: 12px; max-width: 190px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.d-status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
.d-status-badge.entregue  { background: color-mix(in oklab,var(--good) 12%,transparent); color: var(--good); }
.d-status-badge.preparo   { background: color-mix(in oklab,var(--warn) 14%,transparent); color: var(--warn); }
.d-status-badge.cancelado { background: color-mix(in oklab,var(--danger) 11%,transparent); color: var(--danger); }
.d-table-footer { padding: 10px 20px; border-top: 1px solid var(--line); background: var(--bg-sunken); font-size: 12px; color: var(--fg-muted); display: flex; justify-content: space-between; }

/* ═══ BLOCO 5 — INFERIOR ═══ */
.d-bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.d-product-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line); }
.d-product-row:last-child { border-bottom: none; }
.d-rank { font-weight: 700; width: 26px; text-align: center; flex-shrink: 0; font-size: 14px; color: var(--fg-muted); }
.d-rank.gold   { color: #d97706; }
.d-rank.silver { color: #64748b; }
.d-rank.bronze { color: #b45309; }
.d-table-map { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.d-table-cell {
  aspect-ratio: 1/1; border-radius: var(--radius-sm); border: 1px solid var(--line); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; font-size: 14px; font-weight: 700; font-family: var(--font-mono);
  transition: transform 80ms, box-shadow 80ms;
}
.d-table-cell:hover { transform: scale(1.04); box-shadow: var(--shadow-sm); }
.d-table-cell.livre   { background: color-mix(in oklab,var(--good) 8%,transparent); border-color: color-mix(in oklab,var(--good) 22%,transparent); color: var(--good); }
.d-table-cell.ocupada { background: color-mix(in oklab,var(--danger) 7%,transparent); border-color: color-mix(in oklab,var(--danger) 22%,transparent); color: var(--danger); }
.d-table-cell.conta   { background: color-mix(in oklab,var(--warn) 9%,transparent); border-color: color-mix(in oklab,var(--warn) 28%,transparent); color: var(--warn); }
.d-table-cell-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-ui); font-weight: 600; opacity: 0.75; }

/* ═══ MODAL ═══ */
.d-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.42); z-index: 400; display: grid; place-items: center; padding: 20px; backdrop-filter: blur(3px); }
.d-modal {
  background: var(--bg-elev); border: 1px solid var(--line-strong);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
  width: 100%; max-width: 560px; max-height: calc(100vh - 40px);
  display: flex; flex-direction: column; overflow: hidden;
  animation: dash-modal 200ms ease-out;
}
.d-modal-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); background: var(--bg-sunken); }
.d-modal-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.d-modal-body { flex: 1; overflow-y: auto; padding: 20px 22px; display: flex; flex-direction: column; gap: 20px; }
.d-modal-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--bg-sunken); }
.d-modal-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; color: var(--fg-soft); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }

/* ═══ OPERADOR ═══ */
.d-op-actions { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.d-op-btn {
  padding: 22px 16px; border: 2px solid var(--line); border-radius: var(--radius);
  background: var(--bg-elev); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: var(--fg); transition: border-color 120ms, box-shadow 120ms, transform 80ms;
  text-align: center; min-height: 100px; font: inherit;
}
.d-op-btn:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); transform: translateY(-2px); }
.d-op-btn:active { transform: translateY(0); }
.d-op-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.d-op-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.d-op-row { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }

/* ═══ ANIMAÇÕES ═══ */
@keyframes dash-pulse   { 0%{transform:scale(1);opacity:0.35} 100%{transform:scale(2.8);opacity:0} }
@keyframes dash-slidein { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
@keyframes dash-fadein  { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
@keyframes dash-modal   { from{opacity:0;transform:scale(0.97) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }

/* ═══ RESPONSIVO ═══ */
@media (max-width:1280px) { .d-charts-row { grid-template-columns: 1fr; } }
@media (max-width:1100px) { .d-metric-cards { grid-template-columns: repeat(2,1fr); } }
@media (max-width:1024px) {
  .dash-app { grid-template-areas:"header" "main"; grid-template-columns: 1fr !important; }
  .dash-sidebar { position: fixed; top: 64px; left: 0; bottom: 0; width: 240px; transform: translateX(-100%); transition: transform 200ms ease; z-index: 50; box-shadow: var(--shadow-lg); }
  .dash-sidebar.open { transform: translateX(0); }
  .d-sidebar-backdrop { display: block !important; }
  .d-clock { display: none; }
}
@media (max-width:768px) {
  .d-status-bar { grid-template-columns: repeat(2,1fr); }
  .d-bottom-row { grid-template-columns: 1fr; }
  .d-op-actions { grid-template-columns: repeat(2,1fr); }
  .d-op-row { grid-template-columns: 1fr; }
  .d-main-inner { padding: 16px 16px 32px; }
  .d-page-head { padding: 16px 16px 0; }
  .d-view-toggle-bar { padding: 10px 16px 0; }
  .d-search { display: none; }
}
@media (max-width:480px) {
  .d-metric-cards { grid-template-columns: 1fr; }
  .d-status-bar { grid-template-columns: 1fr 1fr; }
}

/* ═══════════════════════════════════════════════
   TWEAKS — TOM (personality)
═══════════════════════════════════════════════ */
:root[data-tom="operacional"] {
  --accent: #dc2626; --accent-hover: #b91c1c;
  --radius-sm: 3px; --radius: 5px; --radius-lg: 7px;
  --bg-sunken: oklch(0.96 0.003 250);
  --tom-mark-radius: 4px;
}
:root[data-tom="hospitalidade"] {
  --accent: #d97706; --accent-hover: #b45309;
  --tom-mark-radius: 8px;
}
:root[data-tom="premium"] {
  --accent: #1e293b; --accent-hover: #0f172a;
  --radius-sm: 10px; --radius: 16px; --radius-lg: 22px;
  --tom-mark-radius: 14px;
}
:root[data-tom="premium"][data-theme="dark"] {
  --accent: #f5e7c5; --accent-hover: #e7d8b3; --accent-fg: #1e293b;
}
:root[data-tom] {
  --accent-soft: color-mix(in oklab, var(--accent) 10%, transparent);
  --accent-softer: color-mix(in oklab, var(--accent) 5%, transparent);
}
:root[data-tom] .brand-mark { border-radius: var(--tom-mark-radius); }
:root[data-tom="premium"] body { font-feature-settings: "cv11","ss01","ss03"; letter-spacing: -0.005em; }
:root[data-tom="premium"] .d-greeting,
:root[data-tom="premium"] .d-card-title,
:root[data-tom="premium"] .d-modal-title { font-weight: 600; letter-spacing: -0.025em; }
:root[data-tom="premium"] .d-status-val,
:root[data-tom="premium"] .d-metric-val { font-family: var(--font-ui); font-weight: 600; letter-spacing: -0.03em; }
:root[data-tom="operacional"] .d-card,
:root[data-tom="operacional"] .d-status-card,
:root[data-tom="operacional"] .d-metric-card { box-shadow: none !important; }

/* ═══════════════════════════════════════════════
   TWEAKS — DENSIDADE
═══════════════════════════════════════════════ */
:root[data-densidade="compacto"] {
  --d-pad-main: 14px 20px 28px;
  --d-pad-card: 12px 14px;
  --d-gap: 10px;
  --d-metric-val: 22px; --d-status-val: 22px;
  --d-greeting: 18px;
}
:root[data-densidade="confortavel"] {
  --d-pad-main: 20px 28px 40px;
  --d-pad-card: 18px 20px;
  --d-gap: 16px;
  --d-metric-val: 28px; --d-status-val: 26px;
  --d-greeting: 22px;
}
:root[data-densidade="amplo"] {
  --d-pad-main: 36px 44px 56px;
  --d-pad-card: 28px 32px;
  --d-gap: 24px;
  --d-metric-val: 36px; --d-status-val: 34px;
  --d-greeting: 28px;
}
:root[data-densidade] .d-main-inner { padding: var(--d-pad-main); gap: var(--d-gap); }
:root[data-densidade] .d-page-head { padding: calc(var(--d-pad-main) + 0px) calc(var(--d-pad-main) + 0px) 0; padding-top: var(--d-gap); padding-bottom: 0; }
:root[data-densidade] .d-metric-card,
:root[data-densidade] .d-status-card { padding: var(--d-pad-card); }
:root[data-densidade] .d-metric-val { font-size: var(--d-metric-val); }
:root[data-densidade] .d-status-val { font-size: var(--d-status-val); }
:root[data-densidade] .d-greeting { font-size: var(--d-greeting); }
:root[data-densidade] .d-charts-row,
:root[data-densidade] .d-bottom-row,
:root[data-densidade] .d-status-bar,
:root[data-densidade] .d-metric-cards,
:root[data-densidade] .d-op-actions,
:root[data-densidade] .d-op-row { gap: var(--d-gap); }

/* ═══════════════════════════════════════════════
   TWEAKS — ENERGIA
═══════════════════════════════════════════════ */
:root[data-energia="calmo"] .d-pulse-dot::after { display: none; }
:root[data-energia="calmo"] tr.new-row { animation: none !important; }
:root[data-energia="calmo"] .d-metric-delta.up { color: var(--fg-muted) !important; }
:root[data-energia="calmo"] .d-metric-icon { background: var(--bg-sunken); color: var(--fg-muted); }
:root[data-energia="calmo"] .d-status-val { color: var(--fg) !important; }
:root[data-energia="calmo"] .d-metric-card:hover,
:root[data-energia="calmo"] .d-status-card:hover { transform: none; box-shadow: none; }
:root[data-energia="vibrante"] .d-metric-card,
:root[data-energia="vibrante"] .d-status-card { transition: transform 160ms cubic-bezier(.34,1.56,.64,1), box-shadow 160ms; }
:root[data-energia="vibrante"] .d-metric-card:hover,
:root[data-energia="vibrante"] .d-status-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px -10px color-mix(in oklab, var(--accent) 40%, transparent); }
:root[data-energia="vibrante"] .d-metric-icon { box-shadow: 0 0 0 3px var(--accent-softer); }
:root[data-energia="vibrante"] tr.new-row td { background: color-mix(in oklab, var(--accent) 8%, transparent); }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-root"></div>

<script>

}/*EDITMODE-END*/;
