version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
    groups:
      aspnetcore:
        patterns:
          - 'Microsoft.AspNetCore.*'
      build-tooling:
        patterns:
          - 'AspNetCore.SassCompiler'
          - 'MinVer'
          - 'Microsoft.SourceLink.*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
