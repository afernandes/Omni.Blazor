name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
  pull_request:
    branches: [main]
    # Sem paths-ignore aqui: com "required status checks" no ruleset da main, um PR
    # que não dispara o CI ficaria travado esperando um check que nunca roda. Assim
    # todo PR roda o Build e os checks obrigatórios sempre reportam.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CI: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so MinVer can resolve version from git tags.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Omni.Blazor.slnx

      - name: Build
        run: dotnet build Omni.Blazor.slnx --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test test/Omni.Blazor.Tests/Omni.Blazor.Tests.csproj --configuration Release --no-build
          dotnet test test/Omni.Blazor.Mcp.Tests/Omni.Blazor.Mcp.Tests.csproj --configuration Release --no-build

      - name: Pack (Omni.Blazor, dry-run)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/Omni.Blazor/Omni.Blazor.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            -p:ContinuousIntegrationBuild=true

      - name: Upload preview packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-preview
          path: ./artifacts/*.*nupkg
          retention-days: 14
          if-no-files-found: error
